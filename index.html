<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Q3 Skills Test</title>
  <style>
    body{
        margin:0;
        font-family: Arial;
        background-image:url("background.jfif");
        background-size:cover;
    }

    .navbar{
        background:#947349;
        color:white;
        display:flex;
        align-items:center;
        padding:10px 20px;
        height: 90px;
    }

    .logo{
        width:70px;
        margin-right:10px;
        margin-left: 20px;
        border-radius: 50%;
    }   

    .nav-links{
        flex:1;
    }

    .nav-links a{
        color:white;
        text-decoration:none;
        margin-right:15px;
        margin-left: 15px;
    }

    .nav-right a{
        color:white;
        margin-left:15px;
        margin-right: 15px;
        text-decoration:none;
    }

    .create-btn{
        background:#e4b880;
        padding:6px 12px;
        border-radius:5px;
    }

    .container{
        width:600px;
        margin:60px auto;
    }

    .form-box{
        background:rgba(160, 127, 89, 0.35);
        padding:30px;
        border-radius:50px;
        backdrop-filter: blur(4px);
        width: 100%;
    }

    .title{
        text-align:center;
        font-size:28px;
        margin-bottom:10px;
    }

    .instructions{
        font-size:12px;
        margin-bottom:20px;
    }

    .profile{
        text-align:center;
    }

    .profile img{
        width:240px;
        border-radius:30%;
        margin-bottom:10px;
        margin-top: 15px;
    }

    input{
        width:100%;
        padding:15px;
        border-radius:2px;
        border: 10px;
    }

    .row{
        display:flex;
        gap:10px;
    }

    .row input{
        width:100%;
    }

    button{
        padding:10px;
        border:none;
        border-radius:5px;
        cursor:pointer;
    }

    .upload-btn{
        background:#2aaae2;
        color:white;
        width:100%;
        margin-top:5px;
    }

    .submit-btn{
        background:#a57a52;
        color:white;
        width:100%;
        margin-top:10px;
    }

    .cancel-btn{
        background:#ddd;
        width:100%;
        margin-top:5px;
    }

    .collapse-btn{
        width:100%;
        height: 70px;
        padding:10px;
        margin-bottom:10px;
        background:#a58160;
        color:white;
        border-radius: 25px;
    }

    .footer{
        text-align:center;
        margin-top:15px;
        font-size:12px;
    }

    .form-row{
        display: flex;
        justify-content: space-between;
    }

    .form-group{
        width: 48%;
    }
    
    .form-group input{
        width: 100%;
    }

    label{
        display: block;
        margin-bottom: 5px;
    }

    .form-container{
        display: flex;
        justify-content: space-between;
        gap: 15px;
    }

    .form-container input{
        flex: 1;
    }

    input[type="checkbox"]{
        width:auto;
        margin-right:8px;
    }
  </style>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css " rel="stylesheet">
</head>
<body>
    <div class="navbar">
        <img src="logo.jfif" class="logo">
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Schedule</a>
            <a href="#">Help</a>
        </div>

        <div class="nav-right">
            <a href="#">Book Now</a>
            <a href="#" class="create-btn">Create Account</a>
        </div>
    </div>

    <div class="container">
        <div class="form-box" id="form">
            <div class="title">REGISTRATION</div>
            <div class="instructions">
                <b>Instructions</b><br>
                Please fill out all required fields in the registration form with accurate information.
                Once completed, review your details and click Submit to finish your registration.

                <div class="profile">
                    <img id="profilePreview" src="https://via.placeholder.com/120">
                    <input type="file" id="photoInput" accept="image/*" onchange="previewPhoto()" required>
                </div>

                <form id="registerForm" onsubmit="createAccount(event)">
                    <div class="form-row">
                        <div class="form-group">
                            <input placeholder="First Name" type="text" required>
                        </div>
                        <div class="form-group">
                            <input placeholder="Last Name" type="text" required>
                        </div>
                    </div>
            
                    <br>
                    <br>

                    <div class="form-container">
                        <input type="text" placeholder="Age" required>
                        <input type="text" placeholder="Contact Number" required>
                        <input type="text" placeholder="Email" required>
                    </div>
                    
                    <br>
                    <br>

                    <div class="form-row">
                        <div class="form-group">
                            <input placeholder="Enter your username" type="text" required>
                        </div>
                        <div class="form-group">
                            <input placeholder="Enter your password" type="password" required>
                        </div>
                    </div>

                    <br>
                    
                    <label>
                        <input type="checkbox" required>
                            I accept the Terms of Use and Privacy Policy
                    </label>

                    <button class="submit-btn" type="submit">Create my account</button>
                    <button class="cancel-btn" type="reset">Cancel</button>
                </form>

                </div>
                    <div class="footer">
                        Sydney de Leon | 9 - Ruby ©2026
                </div>
        </div>

    <script>
        function previewPhoto(){
            let file = document.getElementById("photoInput").files[0];
            if(file){
                let reader = new FileReader();
                reader.onload = function(event){
                document.getElementById("profilePreview").src = event.target.result;
                };
                reader.readAsDataURL(file);
                alert("Your profile pic has been uploaded.");
            }
        }

        function toggleForm(){
            let form = document.getElementById("form");
            if(form.style.display === "none"){
                form.style.display = "block";
            }
            else{
                form.style.display = "none";
            }
        }

        function createAccount(event){
            event.preventDefault();

            let photo = document.getElementById("photoInput").files[0];

            if(!photo){
                alert("Please upload a profile picture first!");
                return;
            }

            alert("Account successfully created!");

            document.getElementById("registerForm").reset();

            document.getElementById("profilePreview").src = "https://via.placeholder.com/120";

            document.getElementById("photoInput").value = "";
        }


    </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js "></script>
</body>
</html>
